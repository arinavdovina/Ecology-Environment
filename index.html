<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy: Ecology & Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --jeopardy-blue: #060ce9;
            --jeopardy-yellow: #ffcc00;
            --jeopardy-dark: #000033;
            --glass: rgba(255, 255, 255, 0.1);
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle, var(--jeopardy-blue) 0%, var(--jeopardy-dark) 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Предотвращаем прокрутку всего тела */
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed;
            inset: 0;
            background: var(--jeopardy-dark);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .setup-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--jeopardy-yellow);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .setup-card h1 {
            color: var(--jeopardy-yellow);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px black;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--jeopardy-yellow); font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        .btn-start {
            background: var(--jeopardy-yellow);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            border: none;
        }

        /* --- GAME BOARD --- */
        .game-header { padding: 10px; background: rgba(0,0,0,0.3); text-align: center; }
        .game-header h2 { font-size: 1.2rem; color: var(--jeopardy-yellow); }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto repeat(6, 1fr);
            gap: 8px;
            padding: 10px;
            max-width: 1000px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .category-name {
            background: var(--jeopardy-dark);
            color: var(--jeopardy-yellow);
            border: 1px solid var(--jeopardy-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 5px;
            border-radius: 4px;
        }

        .cell {
            background: var(--jeopardy-blue);
            color: var(--jeopardy-yellow);
            border: 2px solid var(--jeopardy-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .cell:hover { background: #1a23ff; }
        .cell.disabled { opacity: 0.2; cursor: default; filter: grayscale(1); }

        /* --- QUESTION MODAL --- */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 51, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .question-text {
            font-size: 1.8rem;
            max-width: 800px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 700px;
        }

        .option-btn {
            background: var(--jeopardy-blue);
            color: white;
            border: 2px solid white;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .option-btn:hover { background: #1a23ff; border-color: var(--jeopardy-yellow); }
        .option-btn.correct { background: var(--correct) !important; border-color: white; }
        .option-btn.wrong { background: var(--wrong) !important; border-color: white; }

        .feedback-text {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            height: 2rem;
        }

        /* --- SCORE BAR --- */
        .score-bar {
            background: var(--jeopardy-dark);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            border-top: 3px solid var(--jeopardy-yellow);
        }

        .team-score { text-align: center; }
        .team-score .name { color: var(--jeopardy-yellow); font-size: 0.9rem; }
        .team-score .points { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="setup-card">
            <h1>JEOPARDY!</h1>
            <div class="input-group">
                <label>Team 1:</label>
                <input type="text" id="t1-input" value="Eco-Warriors">
            </div>
            <div class="input-group">
                <label>Team 2:</label>
                <input type="text" id="t2-input" value="Green-Guards">
            </div>
            <button class="btn-start" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <header class="game-header">
        <h2>ECOLOGY & ENVIRONMENT</h2>
    </header>

    <div class="board" id="game-board"></div>

    <div class="score-bar">
        <div class="team-score" id="team1-box">
            <div class="name" id="t1-name">TEAM 1</div>
            <div class="points" id="t1-score">0</div>
        </div>
        <div class="team-score" id="team2-box">
            <div class="name" id="t2-name">TEAM 2</div>
            <div class="points" id="t2-score">0</div>
        </div>
    </div>

    <div id="modal">
        <div id="turn-indicator" style="color:var(--jeopardy-yellow); margin-bottom: 10px; font-size: 1.2rem;"></div>
        <div class="question-text" id="q-text"></div>
        <div class="options-container" id="options-grid"></div>
        <div class="feedback-text" id="feedback"></div>
    </div>

    <script>
        const categories = [
            {
                name: "Pollution",
                questions: [
                    { v: 100, q: "Dirty air in cities looking like clouds is...", a: "Smog", o: ["Smog", "Fog", "Steam", "Smoke"] },
                    { v: 200, q: "Plastic in the ocean is a type of ___ pollution.", a: "Water", o: ["Water", "Soil", "Air", "Noise"] },
                    { v: 300, q: "Main gas causing global warming?", a: "CO2", o: ["CO2", "Oxygen", "Nitrogen", "Helium"] },
                    { v: 400, q: "Rain containing harmful chemicals?", a: "Acid rain", o: ["Acid rain", "Heavy rain", "Salty rain", "Toxic snow"] },
                    { v: 500, q: "Pollution from loud sounds?", a: "Noise", o: ["Noise", "Sonic", "Ear", "Vibration"] },
                    { v: 600, q: "Chemicals leaking into the ground cause...", a: "Soil pollution", o: ["Soil pollution", "Dust", "Land erosion", "Mud"] }
                ]
            },
            {
                name: "Wildlife",
                questions: [
                    { v: 100, q: "A place where an animal lives naturally?", a: "Habitat", o: ["Habitat", "House", "Cage", "Zoo"] },
                    { v: 200, q: "Species that might disappear forever?", a: "Endangered", o: ["Endangered", "Dangerous", "Extinct", "Rare"] },
                    { v: 300, q: "Large scale cutting down of trees?", a: "Deforestation", o: ["Deforestation", "Gardening", "Farming", "Logging"] },
                    { v: 400, q: "Animal losing habitat due to melting ice?", a: "Polar bear", o: ["Polar bear", "Penguin", "Seal", "Wolf"] },
                    { v: 500, q: "Variety of plants and animals in an area?", a: "Biodiversity", o: ["Biodiversity", "Biomass", "Bio-mix", "Nature"] },
                    { v: 600, q: "A protected area for wildlife?", a: "Nature Reserve", o: ["Nature Reserve", "Park", "Forest", "Safe zone"] }
                ]
            },
            {
                name: "Recycling",
                questions: [
                    { v: 100, q: "Common bin color for paper recycling?", a: "Blue", o: ["Blue", "Red", "Black", "Yellow"] },
                    { v: 200, q: "The 3 Rs: Reduce, Reuse and ___.", a: "Recycle", o: ["Recycle", "Remove", "Repair", "Renew"] },
                    { v: 300, q: "Material taking 450 years to decompose?", a: "Plastic", o: ["Plastic", "Paper", "Glass", "Wood"] },
                    { v: 400, q: "Turning food waste into fertilizer?", a: "Composting", o: ["Composting", "Cooking", "Digesting", "Rotting"] },
                    { v: 500, q: "To 'Reduce' means to use ___.", a: "Less", o: ["Less", "More", "Nothing", "Better"] },
                    { v: 600, q: "Turning old items into better ones?", a: "Upcycling", o: ["Upcycling", "Cycling", "Downgrading", "Fixing"] }
                ]
            },
            {
                name: "Energy",
                questions: [
                    { v: 100, q: "Energy from the sun is...", a: "Solar", o: ["Solar", "Lunar", "Heat", "Light"] },
                    { v: 200, q: "Source using wind power?", a: "Wind turbine", o: ["Wind turbine", "Fan", "Mill", "Sail"] },
                    { v: 300, q: "Coal, oil, and gas are ___ fuels.", a: "Fossil", o: ["Fossil", "Ancient", "Natural", "Dirty"] },
                    { v: 400, q: "Energy from moving water?", a: "Hydroelectric", o: ["Hydroelectric", "Aquatic", "Tidal", "Liquid"] },
                    { v: 500, q: "Why are fossil fuels bad?", a: "Release CO2", o: ["Release CO2", "Too expensive", "Smell bad", "Hard to find"] },
                    { v: 600, q: "Heat from inside the Earth?", a: "Geothermal", o: ["Geothermal", "Volcanic", "Magma", "Tectonic"] }
                ]
            }
        ];

        let team1 = { name: "", score: 0 };
        let team2 = { name: "", score: 0 };
        let currentTurn = 1; 
        let currentVal = 0;

        function startGame() {
            team1.name = document.getElementById('t1-input').value || "Team 1";
            team2.name = document.getElementById('t2-input').value || "Team 2";
            document.getElementById('t1-name').innerText = team1.name;
            document.getElementById('t2-name').innerText = team2.name;
            document.getElementById('start-screen').style.display = 'none';
            buildBoard();
            updateTurnVisual();
        }

        function buildBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            categories.forEach(cat => {
                const h = document.createElement('div');
                h.className = 'category-name';
                h.innerText = cat.name;
                board.appendChild(h);
            });

            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 4; c++) {
                    const q = categories[c].questions[r];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = q.v;
                    cell.onclick = () => openQuestion(q, cell);
                    board.appendChild(cell);
                }
            }
        }

        function updateTurnVisual() {
            document.getElementById('team1-box').style.opacity = currentTurn === 1 ? "1" : "0.5";
            document.getElementById('team2-box').style.opacity = currentTurn === 2 ? "1" : "0.5";
            document.getElementById('team1-box').style.transform = currentTurn === 1 ? "scale(1.1)" : "scale(1)";
            document.getElementById('team2-box').style.transform = currentTurn === 2 ? "scale(1.1)" : "scale(1)";
        }

        function openQuestion(q, element) {
            if (element.classList.contains('disabled')) return;
            element.classList.add('disabled');
            currentVal = q.v;

            const modal = document.getElementById('modal');
            const qText = document.getElementById('q-text');
            const optionsGrid = document.getElementById('options-grid');
            const feedback = document.getElementById('feedback');
            const turnInd = document.getElementById('turn-indicator');

            feedback.innerText = "";
            turnInd.innerText = (currentTurn === 1 ? team1.name : team2.name) + "'s Choice";
            qText.innerText = q.q;
            optionsGrid.innerHTML = "";

            // Перемешиваем варианты
            const options = [...q.o].sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.a);
                optionsGrid.appendChild(btn);
            });

            modal.style.display = 'flex';
        }

        function checkAnswer(btn, selected, correct) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            const feedback = document.getElementById('feedback');
            const isCorrect = selected === correct;

            if (isCorrect) {
                btn.classList.add('correct');
                feedback.innerText = "CORRECT! +" + currentVal;
                feedback.style.color = "var(--correct)";
                if (currentTurn === 1) team1.score += currentVal;
                else team2.score += currentVal;
            } else {
                btn.classList.add('wrong');
                feedback.innerText = "WRONG! Correct was: " + correct;
                feedback.style.color = "var(--wrong)";
                // Показываем правильный
                btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }

            document.getElementById('t1-score').innerText = team1.score;
            document.getElementById('t2-score').innerText = team2.score;

            setTimeout(() => {
                document.getElementById('modal').style.display = 'none';
                currentTurn = currentTurn === 1 ? 2 : 1;
                updateTurnVisual();
                checkEndGame();
            }, 2500);
        }

        function checkEndGame() {
            const total = document.querySelectorAll('.cell').length;
            const played = document.querySelectorAll('.cell.disabled').length;
            if (total === played) {
                let winMsg = "";
                if (team1.score > team2.score) winMsg = team1.name + " WINS!";
                else if (team2.score > team1.score) winMsg = team2.name + " WINS!";
                else winMsg = "IT'S A TIE!";
                alert("GAME OVER\n" + winMsg);
            }
        }
    </script>
</body>
</html>
