<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy: Ecology & Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --jeopardy-blue: #060ce9;
            --jeopardy-yellow: #ffcc00;
            --jeopardy-dark: #000033;
            --glass: rgba(255, 255, 255, 0.1);
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle, var(--jeopardy-blue) 0%, var(--jeopardy-dark) 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Убираем прокрутку всего тела */
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed;
            inset: 0;
            background: var(--jeopardy-dark);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .setup-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--jeopardy-yellow);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .setup-card h1 {
            color: var(--jeopardy-yellow);
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px black;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--jeopardy-yellow); font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        /* --- GAME BOARD --- */
        .game-header { padding: 10px; text-align: center; }
        .game-header h2 { font-family: 'Roboto Condensed', sans-serif; color: var(--jeopardy-yellow); font-size: 1.2rem; }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px;
            max-width: 1000px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        .category-name {
            background: var(--jeopardy-dark);
            color: var(--jeopardy-yellow);
            padding: 8px 5px;
            text-align: center;
            font-weight: bold;
            border: 1px solid var(--jeopardy-yellow);
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell {
            background: var(--jeopardy-blue);
            color: var(--jeopardy-yellow);
            border: 2px solid var(--jeopardy-yellow);
            aspect-ratio: 16 / 9; /* Более узкие блоки */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 5px;
        }

        .cell:hover { background: #1a23ff; }
        .cell.disabled { opacity: 0.2; cursor: default; filter: grayscale(1); }

        /* --- MODAL & OPTIONS --- */
        #modal {
            position: fixed;
            inset: 0;
            background: var(--jeopardy-blue);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .question-text { font-size: 1.8rem; margin-bottom: 25px; max-width: 800px; }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .btn-option {
            background: white;
            color: var(--jeopardy-blue);
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-option.correct { background: var(--correct) !important; color: white; }
        .btn-option.wrong { background: var(--wrong) !important; color: white; }

        .feedback-area { margin-top: 25px; height: 60px; }

        .btn-next {
            background: var(--jeopardy-yellow);
            color: var(--jeopardy-dark);
            padding: 12px 40px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        /* --- SCORE --- */
        .score-bar {
            background: var(--jeopardy-dark);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            border-top: 3px solid var(--jeopardy-yellow);
        }

        .team-score .name { color: var(--jeopardy-yellow); font-size: 0.9rem; }
        .team-score .points { font-size: 1.5rem; font-family: 'Roboto Condensed', sans-serif; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="setup-card">
            <h1>JEOPARDY!</h1>
            <div class="input-group">
                <label>Team 1:</label>
                <input type="text" id="t1-input" value="Eagles">
            </div>
            <div class="input-group">
                <label>Team 2:</label>
                <input type="text" id="t2-input" value="Lions">
            </div>
            <button class="btn-option" style="background:var(--jeopardy-yellow); width:100%" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <header class="game-header">
        <h2>ECOLOGY & ENVIRONMENT</h2>
    </header>

    <div class="board" id="game-board"></div>

    <div class="score-bar">
        <div class="team-score">
            <div class="name" id="t1-name">TEAM 1</div>
            <div class="points" id="t1-score">0</div>
        </div>
        <div class="team-score">
            <div class="name" id="t2-name">TEAM 2</div>
            <div class="points" id="t2-score">0</div>
        </div>
    </div>

    <div id="modal">
        <div id="turn-indicator" style="color:var(--jeopardy-yellow); margin-bottom: 10px; font-weight: bold;"></div>
        <div class="question-text" id="q-text"></div>
        
        <div class="options-grid" id="options-container"></div>

        <div class="feedback-area">
            <button class="btn-next" id="btn-next" onclick="closeModal()">CONTINUE</button>
        </div>
    </div>

    <script>
        const categories = [
            {
                name: "Pollution",
                questions: [
                    { v: 100, q: "Dirty air in cities that looks like clouds?", a: "Smog", o: ["Smog", "Fog", "Steam", "Smoke"] },
                    { v: 200, q: "Main gas causing global warming?", a: "CO2", o: ["Oxygen", "CO2", "Nitrogen", "Helium"] },
                    { v: 400, q: "Rain containing chemicals?", a: "Acid rain", o: ["Heavy rain", "Acid rain", "Toxic storm", "Base rain"] },
                    { v: 600, q: "Too much loud sound is ___ pollution.", a: "Noise", o: ["Air", "Sound", "Noise", "Ear"] }
                ]
            },
            {
                name: "Wildlife",
                questions: [
                    { v: 100, q: "Place where an animal naturally lives?", a: "Habitat", o: ["House", "Habitat", "Zoo", "Cage"] },
                    { v: 200, q: "Species that might disappear forever?", a: "Endangered", o: ["Endangered", "Dangerous", "Small", "Wild"] },
                    { v: 400, q: "Large scale cutting down of trees?", a: "Deforestation", o: ["Gardening", "Farming", "Deforestation", "Logging"] },
                    { v: 600, q: "The variety of life on Earth?", a: "Biodiversity", o: ["Biology", "Biodiversity", "Nature", "Eco-system"] }
                ]
            },
            {
                name: "Recycling",
                questions: [
                    { v: 100, q: "The 3 Rs: Reduce, Reuse, ___?", a: "Recycle", o: ["Recycle", "Return", "Remake", "Repair"] },
                    { v: 200, q: "Material that takes 450 years to vanish?", a: "Plastic", o: ["Paper", "Glass", "Plastic", "Metal"] },
                    { v: 400, q: "Turning food waste into fertilizer?", a: "Composting", o: ["Cooking", "Composting", "Cleaning", "Burying"] },
                    { v: 600, q: "Making something better from old items?", a: "Upcycling", o: ["Upcycling", "Fixing", "Downcycling", "Painting"] }
                ]
            },
            {
                name: "Energy",
                questions: [
                    { v: 100, q: "Energy from the sun?", a: "Solar", o: ["Solar", "Wind", "Lunar", "Heat"] },
                    { v: 200, q: "Coal, oil, and gas are ___ fuels.", a: "Fossil", o: ["Fossil", "Ancient", "Dirty", "Old"] },
                    { v: 400, q: "Energy from moving water?", a: "Hydro", o: ["Wind", "Hydro", "Steam", "Wave"] },
                    { v: 600, q: "Heat from inside the Earth?", a: "Geothermal", o: ["Geothermal", "Volcanic", "Solar", "Ground"] }
                ]
            }
        ];

        let team1 = { name: "", score: 0 };
        let team2 = { name: "", score: 0 };
        let currentTurn = 1;
        let currentVal = 0;

        function startGame() {
            team1.name = document.getElementById('t1-input').value || "Team 1";
            team2.name = document.getElementById('t2-input').value || "Team 2";
            document.getElementById('t1-name').innerText = team1.name;
            document.getElementById('t2-name').innerText = team2.name;
            document.getElementById('start-screen').style.display = 'none';
            buildBoard();
        }

        function buildBoard() {
            const board = document.getElementById('game-board');
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-name';
                div.innerText = cat.name;
                board.appendChild(div);
            });

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const q = categories[c].questions[r];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = q.v;
                    cell.onclick = () => openQuestion(q, cell);
                    board.appendChild(cell);
                }
            }
        }

        function openQuestion(q, el) {
            if (el.classList.contains('disabled')) return;
            el.classList.add('disabled');
            currentVal = q.v;
            
            document.getElementById('turn-indicator').innerText = (currentTurn === 1 ? team1.name : team2.name) + "'S TURN";
            document.getElementById('q-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.a);
                container.appendChild(btn);
            });

            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function checkAnswer(clickedBtn, selected, correct) {
            const allBtns = document.querySelectorAll('.btn-option');
            allBtns.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                clickedBtn.classList.add('correct');
                updateScore(currentVal);
            } else {
                clickedBtn.classList.add('wrong');
                allBtns.forEach(btn => {
                    if (btn.innerText === correct) btn.classList.add('correct');
                });
                updateScore(-currentVal);
            }
            document.getElementById('btn-next').style.display = 'inline-block';
        }

        function updateScore(points) {
            if (currentTurn === 1) {
                team1.score += points;
                document.getElementById('t1-score').innerText = team1.score;
            } else {
                team2.score += points;
                document.getElementById('t2-score').innerText = team2.score;
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            currentTurn = currentTurn === 1 ? 2 : 1;
            
            const remaining = document.querySelectorAll('.cell:not(.disabled)');
            if (remaining.length === 0) {
                const winner = team1.score > team2.score ? team1.name : team2.name;
                alert("GAME OVER! Winner: " + winner);
            }
        }
    </script>
</body>
</html>
